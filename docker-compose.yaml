services:
  db:
    image: postgres:15-alpine
    container_name: authdb_container
    restart: always
    environment:
      POSTGRES_USER: ${user}
      POSTGRES_PASSWORD: ${password}
      POSTGRES_DB: ${dbname}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${user} -d ${dbname}"]
      interval: 5s
      timeout: 6s
      retries: 4
  app:
    build: .
    container_name: authApp_container
    depends_on:
      db:
          condition: service_healthy
    environment:
      DB_URL: host=${host} user=${user} password=${password} dbname=${dbname} port=${port} sslmode=${sslmode}
      JWT_SECRET: keyMicroServiceAuth
    ports:
      - "8080:8080"

volumes:
  postgres_data: